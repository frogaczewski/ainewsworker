name = "ainewsworker"
main = "src/index.ts"
compatibility_date = "2024-01-01"

[observability]
enabled = true

[limits]
cpu_ms = 300000  # 5 minutes — Workers Standard max; pipeline needs >30s default

[vars]
# Feature flag: enables the new batched Haiku classification pipeline.
# Set to "false" to fall back to the legacy single-call Sonnet triage path.
USE_BATCHED_CLASSIFICATION = "true"

# A/B variant fan-out. When ENABLE_AB_VARIANTS=true, each enabled config in
# AB_VARIANT_CONFIGS runs its own classify→compile→send pipeline on the cached
# RSS items, sending a labelled email to frogaczewski@gmail.com only. Baseline
# Claude pipeline is unaffected. See src/providers.ts for the variant registry.
ENABLE_AB_VARIANTS = "false"
AB_VARIANT_CONFIGS = "gemini,gemini-claude,openai"

# Digest illustration. When "true", Phase 2 generates one Economist-style
# montage via gpt-image-1 and inlines it on the EMAIL_TO (owner) send only —
# Polish recipients and other KV subscribers are unaffected. Requires the
# OPENAI_API_KEY secret. Failure is non-fatal: the email still ships without
# an image. See src/image.ts.
ENABLE_DIGEST_IMAGE = "false"

[[kv_namespaces]]
binding = "DIGEST_KV"
id = "ef7d3c8046664432a3632f8a5777a95a"

# --- Queues ---
# The queue carries two flavours of work:
#
# 1. Async-pipeline self-polls (poll-classify, poll-compile). Each Stage A
#    submission enqueues a delayed poll-classify; when the Anthropic Haiku
#    batch ends, that handler runs Stage B (collect → dedup → select → submit
#    Sonnet batch) and enqueues poll-compile, which similarly drives Stage C.
#    Self-polls always msg.ack() — never msg.retry() — to avoid duplicate
#    Anthropic batch submissions; the 01/03 UTC cron fallbacks recover lost
#    messages.
#
# 2. Legacy compile-and-send / resend / variant messages. Same handler, kept
#    so /resend and disabled A/B variants keep working.
#
# The queues themselves are created via:
#   npx wrangler queues create ainewsworker-digest
#   npx wrangler queues create ainewsworker-digest-dlq
[[queues.producers]]
binding = "DIGEST_QUEUE"
queue = "ainewsworker-digest"

# Consumer for the main queue. max_batch_size=1 so each digest run gets the
# full per-invocation budget; max_concurrency=1 so we never have two Stage-B
# or Stage-C runs racing on the same KV state.
[[queues.consumers]]
queue = "ainewsworker-digest"
max_batch_size = 1
max_batch_timeout = 5
max_retries = 2
max_concurrency = 1
retry_delay = 60
dead_letter_queue = "ainewsworker-digest-dlq"

# DLQ consumer — no retries, just send an alarm email and ack.
[[queues.consumers]]
queue = "ainewsworker-digest-dlq"
max_batch_size = 1
max_batch_timeout = 5
max_retries = 0
max_concurrency = 1

[triggers]
# Async batched pipeline (see src/index.ts § "Batched async pipeline"):
#   23:00 UTC  Stage A — fetch RSS + submit Haiku classification batch.
#   01:00 UTC  Stage B fallback — checkpoint poll-classify (no-op if Stage B
#                                  already advanced via the queue self-poll).
#   03:00 UTC  Stage C fallback — checkpoint poll-compile (no-op if shipped).
#   04:30 UTC  Watchdog — alarm email if `digest:lastSuccess != date`.
# Between the crons, queue-delayed self-polls (poll-classify / poll-compile)
# drive progression as soon as each Anthropic batch ends.
crons = ["0 23 * * *", "0 1 * * *", "0 3 * * *", "30 4 * * *"]

# All secrets are already set in the Cloudflare dashboard:
# CLAUDE_PLATFORM_API  — Anthropic API key
# MAILJET_API_KEY      — Mailjet public key
# MAILJET_SECRET_KEY   — Mailjet secret key
# UNSUB_TOKEN_SECRET   — HMAC key for unsubscribe-link tokens. Deterministic
#                        tokens are derived from (email, lang) at digest-send
#                        time, so this secret is required for the subscribe/
#                        unsubscribe flow to work. Generate with e.g.
#                        `openssl rand -hex 32` and push with
#                        `npx wrangler secret put UNSUB_TOKEN_SECRET`.
#
# A/B variant secrets (set via `wrangler secret put` once you enable variants):
# GEMINI_API_KEY       — Google AI Studio key (free tier at ai.google.dev)
#
# Image-generation secret (set once you enable ENABLE_DIGEST_IMAGE):
# OPENAI_API_KEY       — OpenAI key for gpt-image-1. Only read when
#                        ENABLE_DIGEST_IMAGE=true; safe to leave unset otherwise.
#
# Optional env vars (plain, not secrets):
# PUBLIC_ORIGIN=https://…                 — origin used in transactional email
#                                            links. Falls back to the hardcoded
#                                            workers.dev URL when unset. Set in
#                                            `.dev.vars` for local testing.
# DRY_EMAIL=true                          — wrangler dev only: log confirmation
#                                            emails to the console instead of
#                                            hitting Mailjet. Digest sends are
#                                            unaffected.
# USE_BATCHED_CLASSIFICATION=true         — enables the new batched Haiku
#                                            pipeline. Unset/"false" runs the
#                                            legacy single-call Sonnet triage.
# ENABLE_DIGEST_IMAGE=true                — generate an Economist-style
#                                            illustration for the owner's email
#                                            only. Requires OPENAI_API_KEY.
